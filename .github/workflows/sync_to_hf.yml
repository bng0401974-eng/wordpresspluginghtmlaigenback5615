name: Sync to HF Static
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Generate Index
        run: python engine_builder.py

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Конфигурирај го корисникот
          git config --global user.email "bot@lativm.com"
          git config --global user.name "LATIVM Bot"
          
          # 2. Иницијализирај го далечинското
          git remote add huggingface https://Dame1612:$HF_TOKEN@huggingface.co/spaces/Dame1612/wordpresspluginghtmlaigenback5615
          
          # 3. Осигурај се дека index.html постои
          ls -la index.html
          
          # 4. Форсирано префрлање
          git add -f index.html
          git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
          git push --force huggingface main:main
          