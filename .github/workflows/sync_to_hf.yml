name: Sync to HF Static
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Generate Index
        run: python engine_builder.py

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@lativm.com"
          git config --global user.name "LATIVM Bot"
          git remote add huggingface https://Dame1612:$HF_TOKEN@huggingface.co/spaces/Dame1612/wordpresspluginghtmlaigenback5615
          git add index.html
          git commit -m "Автоматско ажурирање на index.html" || echo "No changes"
          git push --force huggingface main