name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Го решава предупредувањето
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # v5 е понова
        with:
          python-version: '3.9'

      - name: Generate Content
        run: |
          pip install flask
          python engine_builder.py

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@lativm.com"
          git config --global user.name "LATIVM Bot"
          git remote add huggingface https://Dame1612:$HF_TOKEN@huggingface.co/spaces/Dame1612/wordpresspluginghtmlaigenback5615
          # Исчисти ги претходните commit-и за да не е претешко за HF
          git add -A
          git commit -m "Auto-deploy: $(date)" || echo "No changes"
          git push --force huggingface main:main