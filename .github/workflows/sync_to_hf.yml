name: Sync to HF Static
on: [push]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: |
          python -m pip install --upgrade pip
          pip install google-genai huggingface_hub
      - name: Generate Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python engine_builder.py
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(path_or_fileobj='index.html', path_in_repo='index.html', repo_id='Dame1612/wordpresspluginghtmlaigenback5615', repo_type='space', token='$HF_TOKEN')
          "